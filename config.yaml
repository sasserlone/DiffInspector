# ──────────────────────────────────────────────
# Code Review Agent – Konfiguration
# ──────────────────────────────────────────────

ollama:
  provider: "deepseek"               # ollama | deepseek
  # Ollama (nur wenn provider: ollama)
  base_url: "http://host.docker.internal:11434"
  model: "codellama:7b"
  # OpenAI-kompatibel (DeepSeek, OpenAI)
  api_key: ""                         # Oder via CRA_API_KEY env
  api_base_url: "https://api.deepseek.com"
  api_model: "deepseek-chat"
  # Gemeinsam
  temperature: 0.2
  max_tokens: 300
  timeout: 120
  num_ctx: 4096                    # Kontextfenster

review:
  # Maximalgröße eines Diffs in Zeilen – größere Diffs werden chunked
  max_diff_lines: 500
  # Pro Chunk zu reviewende Zeilen
  chunk_size: 200
  # Parallelität (0 = sequenziell)
  parallel_chunks: 0
  # Label für Inline-Kommentare
  comment_label: "🤖 AI Review"
  # Pfad zur Output-Datei (wenn --output gesetzt)
  output_dir: "./reports"

rules:
  enabled: true
  rules_dir: "./rules"
  # Standard-Regelwerke
  profiles:
    default:
      - "default.yaml"
      - "security.yaml"
    security:
      - "security.yaml"
    minimal:
      - "default.yaml"

git:
  # Aus welchem Remote sollen PR-Infos geholt werden?
  remote: "origin"
  # Temporäres Verzeichnis fürge Klone
  work_dir: "/tmp/code-review-agent"

logging:
  level: "INFO"   # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
